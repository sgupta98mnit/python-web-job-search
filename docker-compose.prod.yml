services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jobsearch}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobsearch} -d ${POSTGRES_DB:-jobsearch}"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey-data:/data

  tor:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080/}
      SEARXNG_REDIS_URL: redis://valkey:6379/0
    depends_on:
      - valkey
      - tor

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PASSWORD: ${APP_PASSWORD:?Set APP_PASSWORD in .env}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in .env}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jobsearch}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-jobsearch}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-searxng}
      SEARXNG_URL: http://searxng:8080
    volumes:
      - output-data:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      API_BASE_INTERNAL: http://api:8000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  valkey-data:
  output-data:
