use_default_settings: true

general:
  debug: false
  instance_name: "job-search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  # Replace this for local or deployed usage.
  secret_key: "change-me"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true

redis:
  url: redis://valkey:6379/0

outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0
  pool_connections: 100
  pool_maxsize: 20
